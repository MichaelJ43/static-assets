name: Deploy

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "deploy/terraform/**"
      - ".github/workflows/deploy.yml"
      - "package.json"
      - "package-lock.json"

permissions:
  id-token: write
  contents: read
  deployments: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
      TF_STATE_KEY: static-assets/terraform.tfstate
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_project: static-assets
      TF_VAR_environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Terraform init
        working-directory: deploy/terraform/aws
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        working-directory: deploy/terraform/aws
        run: |
          set -e
          if [ -n "${{ vars.TF_CUSTOM_DOMAIN }}" ]; then
            export TF_VAR_custom_domain="${{ vars.TF_CUSTOM_DOMAIN }}"
          fi
          if [ -n "${{ secrets.TF_ACM_CERTIFICATE_ARN }}" ]; then
            export TF_VAR_acm_certificate_arn="${{ secrets.TF_ACM_CERTIFICATE_ARN }}"
          fi
          if [ -n "${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}" ]; then
            export TF_VAR_route53_hosted_zone_id="${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}"
          fi
          if [ -n "${{ secrets.TF_SITE_BUCKET_NAME }}" ]; then
            export TF_VAR_site_bucket_name="${{ secrets.TF_SITE_BUCKET_NAME }}"
          fi
          terraform apply -auto-approve

      - name: Terraform outputs
        id: tf
        working-directory: deploy/terraform/aws
        run: |
          echo "site_bucket=$(terraform output -raw site_bucket)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "site_url=$(terraform output -raw site_url)" >> "$GITHUB_OUTPUT"

      - name: Sync to S3
        env:
          BUCKET: ${{ steps.tf.outputs.site_bucket }}
        run: |
          set -e
          aws s3 sync dist/v1/ "s3://${BUCKET}/v1/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp dist/index.html "s3://${BUCKET}/index.html" \
            --cache-control "public, max-age=60, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.cloudfront_distribution_id }}" \
            --paths "/*"

      - name: Summary
        run: |
          echo "### Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.tf.outputs.site_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- S3: \`s3://${{ steps.tf.outputs.site_bucket }}\`" >> "$GITHUB_STEP_SUMMARY"
